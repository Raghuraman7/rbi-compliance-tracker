name: Update RBI & SEBI Regulatory Feed Data

on:
  schedule:
    # Run every 5 minutes for fast cloud backup checks.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # Manual refresh from Actions tab
  push:
    branches: [main]
    paths:
      - "scripts/**"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest compliance & regulatory data
        run: npm run fetch
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}

      - name: Commit updated data
        run: |
          git config user.name "regnote-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: refresh regulatory compliance data [skip ci]"
          git push

