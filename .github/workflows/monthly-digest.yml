name: Send Monthly Regulatory Digest Email

on:
  schedule:
    # Runs at 23:30 IST (18:00 UTC) on the 28th, 29th, 30th, 31st of every month
    # And 08:00 IST (02:30 UTC) on 1st of every month
    - cron: "0 2:30 1 * *"
  workflow_dispatch:
    inputs:
      month:
        description: "Month number (1-12, optional)"
        required: false
        default: ""
      year:
        description: "Year (YYYY, optional)"
        required: false
        default: ""

jobs:
  monthly-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest data before digest
        run: npm run fetch

      - name: Generate and Send Monthly Compliance Digest Email
        run: |
          if [ -n "${{ github.event.inputs.month }}" ] && [ -n "${{ github.event.inputs.year }}" ]; then
            node scripts/send-monthly-digest.mjs --month ${{ github.event.inputs.month }} --year ${{ github.event.inputs.year }}
          else
            npm run digest:monthly
          fi
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
